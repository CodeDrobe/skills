name: Validate Skills

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Discover skill catalog
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Discover installable Skills
        run: npm test

      - name: Pack bundled theme sources
        shell: bash
        run: |
          shopt -s globstar nullglob
          manifests=(skills/*/assets/**/theme.json)
          if [ "${#manifests[@]}" -eq 0 ]; then
            echo "No bundled theme sources found; the skill assets moved without updating CI."
            exit 1
          fi
          for manifest in "${manifests[@]}"; do
            name="$(basename "$(dirname "$manifest")")"
            echo "Packing $manifest"
            npx --yes --package=@codedrobe/core@latest codedrobe theme pack \
              "$manifest" --output "/tmp/${name}.codedrobe-theme"
          done

      - name: Reject unfinished Skill placeholders
        shell: bash
        run: |
          if grep -R "TODO" skills --include="SKILL.md"; then
            echo "Unfinished Skill placeholder found."
            exit 1
          fi
